# Cross-platform release automation via cargo-dist.
# Regenerate with: cargo install cargo-dist && dist init
# See: https://opensource.axo.dev/cargo-dist/

name: Release
on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        run: cargo install cargo-dist --locked

      - name: Build release artifacts
        run: dist build --artifacts=local --target=x86_64-unknown-linux-gnu

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: target/distrib/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
