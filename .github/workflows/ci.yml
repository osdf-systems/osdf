name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build release binaries
        run: cargo build --workspace --release --locked

  security-audit:
    name: RustSec audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check advisories, licenses, and sources
        run: cargo deny check

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [rust, security-audit, cargo-deny]
    if: always()
    steps:
      - name: Require all jobs to pass
        run: |
          if [[ "${{ needs.rust.result }}" != "success" ]]; then
            echo "Rust matrix failed."
            exit 1
          fi
          if [[ "${{ needs.security-audit.result }}" != "success" ]]; then
            echo "cargo audit failed."
            exit 1
          fi
          if [[ "${{ needs.cargo-deny.result }}" != "success" ]]; then
            echo "cargo deny failed."
            exit 1
          fi
          echo "All CI jobs passed."
